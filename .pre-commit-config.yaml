# Local dev setup:
#   pip install -r requirements-dev.txt
#   pre-commit install
#
# Ruff runs on every commit — autofixes imports / formatting / easy lints.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
