# Tag-push release pipeline.
#
# Push a tag like `v1.2.3` and this workflow builds the Windows .exe and the
# Linux AppImage in parallel, then publishes a GitHub Release with both as
# assets. The release title and tag are taken from the pushed ref.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build single-file .exe
        run: python -m PyInstaller gsboard.spec --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/GSBoard.exe
          if-no-files-found: error

  build-linux:
    # Pinned to 22.04 so the AppImage links against an older glibc and runs
    # on a wider range of distros than a 24.04-built binary would.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system build deps
        # dbus-python / evdev / PyQt6 all need headers or runtime libs that
        # the bare runner doesn't ship with.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev libglib2.0-dev pkg-config \
            libportaudio2 libsndfile1 \
            libxcb-cursor0 libxkbcommon-x11-0 \
            libegl1 libgl1

      - name: Install appimagetool
        # Extract the AppImage once and expose its inner AppRun as
        # `appimagetool` on PATH — avoids depending on FUSE inside CI.
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          (cd /tmp && /tmp/appimagetool.AppImage --appimage-extract > /dev/null)
          sudo mv /tmp/squashfs-root /opt/appimagetool
          printf '#!/bin/bash\nexec /opt/appimagetool/AppRun "$@"\n' | sudo tee /usr/local/bin/appimagetool > /dev/null
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build AppImage
        run: ./build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: "*.AppImage"
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/GSBoard.exe \
            artifacts/*.AppImage
